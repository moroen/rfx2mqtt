{% extends "my_index.html" %}
{% block contents %}
    <form action="{% url 'device-add-view' %}" method="get">
        <div class="row mb-3">
            <label for="devicetype" class="col-sm-2 col-form-label">Devicetype:</label>
            <div class="col-sm-10">
                <select class="form-select"
                        id="devicetype"
                        name="devicetype"
                        style="width:auto"
                        hx-get="{% url 'device-add-view' %}"
                        hx-target="#deviceform">
                    <option value="switch">Switch</option>
                    <option value="light">Light</option>
                </select>
            </div>
            <div class="col-sm-10">
                <button type="submit" class="btn btn-primary">Add</button>
            </div>
        </div>
    </form>
    <div id="deviceform">
        {% block deviceform %}
            {% include "device/crispy_form.htmx" %}
        {% endblock %}
    </div>
{% endblock %}
