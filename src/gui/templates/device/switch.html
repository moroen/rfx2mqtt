<div class="form-check form-switch">
        <input hx-put="/api/switches/{{ id }}/"
               name="state"
               value="true"
               id="{{ id }}"
               hx-swap="none"
               class="form-check-input"
               autocomplete="off"
               type="checkbox"
               {% if state == True %}checked{% endif %}>
</input>
</div>
